<header class="app-header modern">
  <div class="header-inner layout-width">
    <div class="brand">
      <div class="brand-mark">
        <i class="ti ti-scan"></i>
      </div>
      <div>
        <p class="eyebrow" data-i18n="app_name">Face Attendance</p>
        <h1 data-i18n="dashboard_title">Dashboard nguoi dung</h1>
      </div>
    </div>
    <div class="header-actions">
      <div class="language-select">
        <i class="bi bi-translate"></i>
        <select id="languageSelect" aria-label="Language">
          <option value="vi">Tieng Viet</option>
          <option value="en">English</option>
        </select>
      </div>
      <button class="ghost-btn" type="button" id="loginBtn" data-i18n="login">Dang nhap</button>
      <button class="ghost-btn" type="button" id="signupBtn" data-i18n="signup">Dang ky</button>
    </div>
  </div>
</header>
